name: security-audit
# 6-katman denetimi SARIF olarak Security -> Code scanning'e yükler (626+ kayıt).
on:
  schedule:
    - cron: "0 5 * * 1"   # Pazartesi 05:00 UTC = 08:00 Istanbul
  workflow_dispatch: {}
permissions:
  contents: read
  security-events: write
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - name: 6-katman doğrulama (kapı)
        run: python3 scripts/validate.py
      - name: SARIF üret
        run: python3 scripts/validate_sarif.py
      - name: SARIF yükle
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: audit.sarif
          category: ajans-audit
