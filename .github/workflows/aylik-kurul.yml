name: aylik-kurul
on:
  schedule:
    - cron: "0 6 1 * *"   # 1st of month 06:00 UTC = 09:00 Istanbul
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  board:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with: { python-version: "3.11" }
      - name: Yönetim kurulu tutanağı (OKR + faz kapısı)
        run: python3 scripts/weekly_board.py --board
      - name: Commit
        run: |
          git config user.name "adops-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git commit -m "kurul: $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "no changes"
          git push || echo "push skipped"
