name: gunluk-operasyon
on:
  schedule:
    - cron: "30 4 * * *"   # 04:30 UTC = 07:30 Istanbul, every day
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Daily ops (standup + is listesi + makale + takip)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/daily_ops.py
      - name: Validate components
        run: python3 scripts/validate.py
      - name: Commit
        run: |
          git config user.name "adops-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git commit -m "daily-ops: $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "no changes"
          git push || echo "push skipped"
