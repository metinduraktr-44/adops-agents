name: seed-auto
# SEGMENT-600 push-tetiklemeli orkestrasyon: seed/plan.json her değiştiğinde
# plandaki hedefi koşar. Cowork oturumu planı push ederek zinciri ilerletir.
on:
  push:
    paths: ["seed/plan.json"]
  workflow_dispatch: {}
permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write
concurrency:
  group: seed-auto
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Planı oku
        id: plan
        run: |
          python3 - >> "$GITHUB_OUTPUT" <<'PY'
          import json
          p = json.load(open('seed/plan.json'))
          print(f"hedef={p.get('hedef','')}")
          print(f"start={p.get('start',0)}")
          print(f"adet={p.get('adet',150)}")
          PY
      - name: Issues (600 rol kaydı) + kickoff
        if: steps.plan.outputs.hedef == 'issues'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
          START: ${{ steps.plan.outputs.start }}
          COUNT: ${{ steps.plan.outputs.adet }}
        run: |
          gh workflow run gunluk-operasyon.yml --ref main || true
          gh workflow run security-audit.yml --ref main || true
          python3 scripts/seed_issues.py
      - name: Pull requests (aktivasyon + merge + doğrulama koşumu)
        if: steps.plan.outputs.hedef == 'prs'
        env:
          GH_TOKEN: ${{ github.token }}
          START: ${{ steps.plan.outputs.start }}
          COUNT: ${{ steps.plan.outputs.adet }}
        run: bash scripts/seed_prs.sh
      - name: Wiki (620+ sayfa)
        if: steps.plan.outputs.hedef == 'wiki'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/build_wiki.py
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" /tmp/wiki \
            || { echo "::error::Wiki başlatılmamış — Wiki sekmesinden Home sayfasını bir kez oluştur."; exit 1; }
          cp wiki-out/*.md /tmp/wiki/
          cd /tmp/wiki
          git config user.name "adops-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git commit -m "wiki: 600+ rol sayfası $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "değişiklik yok"
          git push
      - name: Security (SARIF koşumu tetikle)
        if: steps.plan.outputs.hedef == 'security'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run security-audit.yml --ref main
